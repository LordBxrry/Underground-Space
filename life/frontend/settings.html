<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home – Life</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial,
                sans-serif;
        }

        header {
            background: #000;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
        }

        header nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        header nav a {
            color: #d4a373;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            padding: 12px 0;
            transition: color .3s;
            border-bottom: 2px solid transparent;
        }

        header nav a:hover,
        header nav a.active {
            color: #fff;
            border-bottom-color: #d4a373;
        }

        .main {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .cols {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
            overflow: hidden;
        }

        .card .title {
            padding: 16px 24px;
            border-bottom: 2px solid #d4a373;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .todo-list,
        .posts-feed,
        .blank-area {
            padding: 16px 24px;
        }

        .todo-list ul {
            list-style: none;
        }

        .todo-list li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .todo-list li:last-child {
            border-bottom: none;
        }

        .posts-feed .post {
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 16px;
        }

        .posts-feed .post:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .posts-feed .post .author {
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .posts-feed .post .content {
            color: #555;
            line-height: 1.4;
        }

        @media (max-width: 992px) {
            .cols {
                grid-template-columns: 1fr 1fr;
            }
            .blank-area {
                display: none;
            }
        }

        @media (max-width: 640px) {
            .cols {
                grid-template-columns: 1fr;
            }
            .blank-area {
                display: block;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="profile.html">Profile</a>
            <a href="about.html">About</a>
            <a href="shop.html">Shop</a>
            <a href="https://donate.stripe.com/7sIbMv2RY0ql02Q001">Donate</a>
            <a href="settings.html" class="active">Settings</a>
        </nav>
    </header>

    
</body>
</html>
